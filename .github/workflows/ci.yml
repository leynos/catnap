name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.6'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@47aea18960d24f33aedc4782ec6b73e365418313
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # mold accelerates dev builds; coverage uses lld for llvm-tools compatibility.
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@a93ecb859e2121692f8362a80ea7f3ae8f6c3801
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Setup uv
        uses: astral-sh/setup-uv@c5680ec91f7b9b91406fab4ded5d45245abf7b67
        with:
          python-version: '3.14'
      - name: Spelling
        run: make spelling
      - name: Install test runner
        run: cargo binstall --no-confirm cargo-nextest
      - name: Cache Whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          set -euo pipefail
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          # --cranelift provisions rustc-codegen-cranelift on Whitaker's pinned
          # toolchain; this project builds with the Cranelift debug backend.

          whitaker-installer --cranelift
          echo "Whitaker binary: $(command -v whitaker || true)"
      - name: Lint
        run: make lint
      - name: Log coverage linker configuration
        run: |
          echo "Coverage linker: clang"
          echo "Coverage RUSTFLAGS: -C link-arg=-fuse-ld=lld"
          echo "Coverage CFLAGS: -fuse-ld=lld"
          echo "Coverage LDFLAGS: -fuse-ld=lld"
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@c3141c3d4cb2a2828d2abbcf3d94b15197740c58
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          RUSTFLAGS: -C link-arg=-fuse-ld=lld
          CFLAGS: -fuse-ld=lld
          LDFLAGS: -fuse-ld=lld
        with:
          output-path: lcov.info
          format: lcov
      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: ${{ env.CS_ACCESS_TOKEN }}
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          format: lcov
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
